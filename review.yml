aid: searchcraft
name: Searchcraft
review:
  question: Does Searchcraft expose a documented public WebSocket API?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Per updated API Evangelist scope (2026-05-29), HTTP Server-Sent Events
    (SSE) is in-scope for AsyncAPI modeling. Searchcraft documents one SSE
    surface: POST /index/:index/search/summary streams an AI-generated
    summary of search results over server-sent events. No AsyncAPI document
    was authored in this pass; the SSE summary endpoint is a candidate for a
    future AsyncAPI artifact. No WebSocket surface was modeled because none is
    documented.
findings:
  summary: |
    Searchcraft does not publish a documented public WebSocket API. The
    Searchcraft engine exposes a REST (HTTPS) API for index management,
    document ingestion, search, federated search, synonyms, stopwords,
    transactions, measurement, and access-key management. The only streaming
    surface documented is HTTP Server-Sent Events (SSE) on the AI search
    summary endpoint (POST /index/:index/search/summary). SSE is a one-way
    HTTP streaming transport and is not WebSocket. No realtime, bidirectional
    WebSocket (ws:// or wss://) endpoint is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://your-cluster.searchcraft.io
      documented: true
    - protocol: SSE
      scheme: https
      note: Server-Sent Events delivered by POST /index/:index/search/summary streaming an AI-generated summary. Not WebSocket.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Searchcraft API reference as of the review date.
