actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. One SSE surface (the AI search
    summary endpoint) is documented and noted as a future AsyncAPI candidate
    under the 2026-05-29 SSE scope, but no AsyncAPI document was authored in
    this pass. SSE is documented explicitly so it is never misrepresented as
    WebSocket.
